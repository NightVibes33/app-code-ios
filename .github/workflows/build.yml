name: TestFlight Prep

on:
  workflow_dispatch:
    inputs:
      distribute_external:
        description: Upload to external TestFlight group named Public
        required: false
        default: "false"

concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Archive and upload to TestFlight
    runs-on: macos-26
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode 26.5
        run: sudo xcode-select -s /Applications/Xcode_26.5.app

      - name: Cache downloaded runtime resources
        uses: actions/cache@v4
        with:
          path: Resources
          key: app-code-resources-${{ runner.os }}-${{ hashFiles('downloadFrameworks.sh', 'scripts/bootstrap_resources.sh') }}
          restore-keys: |
            app-code-resources-${{ runner.os }}-

      - name: Cache SwiftPM and DerivedData
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            build/DerivedData
          key: app-code-xcode-${{ runner.os }}-${{ hashFiles('Code.xcodeproj/project.pbxproj', 'Code.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved', 'SwiftGit2/Package.resolved', 'SwiftWS/Package.resolved') }}-${{ github.sha }}
          restore-keys: |
            app-code-xcode-${{ runner.os }}-${{ hashFiles('Code.xcodeproj/project.pbxproj', 'Code.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved', 'SwiftGit2/Package.resolved', 'SwiftWS/Package.resolved') }}-
            app-code-xcode-${{ runner.os }}-

      - name: Bootstrap runtime resources
        run: ./scripts/bootstrap_resources.sh

      - name: Cache Ruby gems
        uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: app-code-bundle-${{ runner.os }}-${{ hashFiles('Gemfile', 'Gemfile.lock') }}
          restore-keys: |
            app-code-bundle-${{ runner.os }}-

      - name: Install Ruby gems
        run: |
          bundle config set path vendor/bundle
          bundle install --jobs 4 --retry 3

      - name: Deploy iOS beta to TestFlight via Fastlane
        run: bundle exec fastlane beta
        env:
          APP_STORE_CONNECT_TEAM_ID: "${{ secrets.APP_STORE_CONNECT_TEAM_ID }}"
          DEVELOPER_APP_ID: "${{ secrets.DEVELOPER_APP_ID }}"
          DEVELOPER_APP_IDENTIFIER: "${{ secrets.DEVELOPER_APP_IDENTIFIER }}"
          DEVELOPER_APP_EXTENSION_IDENTIFIER: "${{ secrets.DEVELOPER_APP_EXTENSION_IDENTIFIER }}"
          DEVELOPER_PORTAL_TEAM_ID: "${{ secrets.DEVELOPER_PORTAL_TEAM_ID }}"
          FASTLANE_APPLE_ID: "${{ secrets.FASTLANE_APPLE_ID }}"
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: "${{ secrets.FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD }}"
          MATCH_PASSWORD: "${{ secrets.MATCH_PASSWORD }}"
          MATCH_GIT_URL: "${{ secrets.MATCH_GIT_URL }}"
          GIT_AUTHORIZATION: "${{ secrets.GIT_AUTHORIZATION }}"
          PROVISIONING_PROFILE_SPECIFIER: "${{ secrets.PROVISIONING_PROFILE_SPECIFIER }}"
          TEMP_KEYCHAIN_PASSWORD: "${{ secrets.TEMP_KEYCHAIN_PASSWORD }}"
          TEMP_KEYCHAIN_USER: "${{ secrets.TEMP_KEYCHAIN_USER }}"
          APPLE_KEY_ID: "${{ secrets.APPLE_KEY_ID }}"
          APPLE_ISSUER_ID: "${{ secrets.APPLE_ISSUER_ID }}"
          APPLE_KEY_CONTENT: "${{ secrets.APPLE_KEY_CONTENT }}"
          DISTRIBUTE_EXTERNAL: "${{ github.event.inputs.distribute_external }}"
          XCODE_PATH: "/Applications/Xcode_26.5.app"
