name: Tests

on:
  pull_request:
    branches:
      - "*"
      - "!gitbook"
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: macos-26
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26.5
        run: sudo xcode-select -s /Applications/Xcode_26.5.app

      - name: Cache downloaded runtime resources
        uses: actions/cache@v4
        with:
          path: Resources
          key: app-code-resources-${{ runner.os }}-${{ hashFiles('downloadFrameworks.sh') }}
          restore-keys: |
            app-code-resources-${{ runner.os }}-

      - name: Cache SwiftPM and DerivedData
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData
          key: app-code-test-xcode-${{ runner.os }}-${{ hashFiles('Code.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved', 'SwiftGit2/Package.resolved', 'SwiftWS/Package.resolved') }}
          restore-keys: |
            app-code-test-xcode-${{ runner.os }}-

      - name: Cache Ruby gems
        uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: app-code-bundle-${{ runner.os }}-${{ hashFiles('Gemfile.lock') }}
          restore-keys: |
            app-code-bundle-${{ runner.os }}-

      - name: Install Ruby gems
        run: |
          bundle config set path vendor/bundle
          bundle install --jobs 4 --retry 3

      - name: Install swift-format
        run: brew list swift-format || brew install swift-format

      - name: Bootstrap runtime resources
        run: ./scripts/bootstrap_resources.sh

      - name: Lint
        run: swift-format lint -r -s ./CodeApp ./Extensions ./CodeUITests

      - name: Unit tests
        run: bundle exec fastlane tests
        env:
          XCODE_PATH: "/Applications/Xcode_26.5.app"
