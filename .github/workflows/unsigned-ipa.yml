name: Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: unsigned-ipa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build unsigned real-device IPA
    runs-on: macos-26
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 26.5
        run: sudo xcode-select -s /Applications/Xcode_26.5.app

      - name: Cache downloaded runtime resources
        uses: actions/cache@v4
        with:
          path: Resources
          key: app-code-resources-${{ runner.os }}-${{ hashFiles('downloadFrameworks.sh') }}
          restore-keys: |
            app-code-resources-${{ runner.os }}-

      - name: Cache SwiftPM and DerivedData
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData
            build/DerivedData
          key: app-code-xcode-${{ runner.os }}-${{ hashFiles('Code.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved', 'SwiftGit2/Package.resolved', 'SwiftWS/Package.resolved') }}
          restore-keys: |
            app-code-xcode-${{ runner.os }}-

      - name: Build unsigned IPA
        run: ./scripts/build_unsigned_ipa.sh

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: AppCode-unsigned-ipa
          path: AppCode-unsigned.ipa
          if-no-files-found: error
