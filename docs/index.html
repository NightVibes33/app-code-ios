<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>App Code</title>
  <meta name="description" content="App Code is a local-first iOS code editor and mobile development toolkit.">
  <style>
    :root { color-scheme: light dark; --bg: #f7f7f4; --fg: #151515; --muted: #5f6368; --line: #d8d8d2; --accent: #0b6bcb; }
    @media (prefers-color-scheme: dark) { :root { --bg: #101112; --fg: #f4f4f0; --muted: #a5a8ad; --line: #323437; --accent: #7ab8ff; } }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--fg); line-height: 1.55; }
    main { max-width: 780px; margin: 0 auto; padding: 56px 22px; }
    h1 { font-size: clamp(2.2rem, 7vw, 4.6rem); line-height: .95; margin: 0 0 20px; letter-spacing: 0; }
    p { font-size: 1.08rem; color: var(--muted); max-width: 680px; }
    nav { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 30px; padding-top: 24px; border-top: 1px solid var(--line); }
    a { color: var(--accent); font-weight: 650; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main>
    <h1>App Code</h1>
    <p>App Code is a local-first code editor and mobile development toolkit for iPhone and iPad. It includes project browsing, syntax highlighting, Git tools, terminal workflows, and local runtime support in a modern iOS interface.</p>
    <nav aria-label="App links">
      <a href="./privacy.html">Privacy Policy</a>
      <a href="https://github.com/NightVibes33/app-code-ios/issues">Support</a>
      <a href="https://github.com/NightVibes33/app-code-ios">GitHub</a>
    </nav>
  </main>
</body>
</html>
